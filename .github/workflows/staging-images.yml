name: Build staging images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: staging-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        env:
          REGISTRY_CREDENTIAL: ${{ github.token }}
        run: |
          printf '%s' "${REGISTRY_CREDENTIAL}" \
            | docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

      - name: Build and push immutable staging images
        run: |
          ./scripts/build-staging-images.sh \
            ghcr.io/yaklede \
            linux/amd64 \
            "${RUNNER_TEMP}/jimin-os-release.env"

      - name: Upload release references
        uses: actions/upload-artifact@v4
        with:
          name: jimin-os-release-${{ github.sha }}
          path: ${{ runner.temp }}/jimin-os-release.env
          if-no-files-found: error
          retention-days: 14
