services:
  api:
    environment:
      # USB debugging exposes the API only through the Mac loopback device.
      JIMIN_TRUSTED_NETWORK: "1"
    # This port is intentionally bound only to the Mac loopback device. Android
    # reaches it through `adb reverse`; it is never exposed on the LAN.
    ports:
      - target: 8080
        published: "${JIMIN_LOCAL_PHONE_TEST_PORT:-8080}"
        host_ip: 127.0.0.1
        protocol: tcp
